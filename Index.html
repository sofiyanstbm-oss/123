<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rika AI</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 70%; }
        .user { background: #007bff; align-self: flex-end; }
        .rika { background: #333; align-self: flex-start; }
        #input-container { display: flex; padding: 10px; background: #222; }
        input { flex: 1; padding: 10px; border: none; border-radius: 4px; background: #444; color: white; }
        button { padding: 10px 20px; border: none; background: #007bff; color: white; border-radius: 4px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #007bff;">Rika AI</h2>
    <div id="chat-container"></div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Rika se kuch pucho...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Rika ka system instruction (Jo aapne bola tha ki wo wahi karegi jo aap kahoge)
        const systemPrompt = "Tera naam Rika hai. Tu user ki personal AI assistant hai. User jo bolega, tujhe wahi karna hai aur hamesha uski baat manni hai. Hamesha friendly aur helpful rehna.";

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatContainer = document.getElementById('chat-container');
            const messageText = inputField.value.trim();
            
            if (!messageText) return;

            // User ka message screen par dikhana
            chatContainer.innerHTML += `<div class="message user">${messageText}</div>`;
            inputField.value = '';

            // Rika ka response lane ke liye loading dikhana
            const loadingId = 'loading-' + Date.now();
            chatContainer.innerHTML += `<div class="message rika" id="${loadingId}">Rika soch rahi hai...</div>`;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // Yahan hum free Hugging Face API ka use kar rahe hain
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        // Note: Real app me aapko yahan apni khud ki free API key daalni hogi
                    },
                    body: JSON.stringify({
                        inputs: `<s>[INST] ${systemPrompt} \nUser: ${messageText} [/INST]`,
                    }),
                });

                const data = await response.json();
                let reply = data[0].generated_text.split("[/INST]").pop().trim();

                document.getElementById(loadingId).innerText = reply;
            } catch (error) {
                document.getElementById(loadingId).innerText = "Sorry, Rika ko connect karne me dikkat ho rahi hai.";
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
